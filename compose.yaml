name: researchflow

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: researchflow
      POSTGRES_USER: researchflow
      POSTGRES_PASSWORD: researchflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchflow -d researchflow"]
      interval: 5s
      timeout: 3s
      retries: 15
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.14.1
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/6333"]
      interval: 5s
      timeout: 3s
      retries: 15
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://researchflow:researchflow@postgres:5432/researchflow
      AUTO_CREATE_TABLES: "false"
      UPLOAD_DIR: /app/data/uploads
      VECTOR_STORE_MODE: qdrant
      QDRANT_URL: http://qdrant:6333
      LLM_MODE: ${LLM_MODE:-openai_compatible}
      CHAT_API_KEY: ${CHAT_API_KEY:-}
      CHAT_BASE_URL: ${CHAT_BASE_URL:-https://api.deepseek.com}
      CHAT_MODEL: ${CHAT_MODEL:-deepseek-v4-flash}
      CHAT_THINKING: ${CHAT_THINKING:-disabled}
      EMBEDDING_MODE: ${EMBEDDING_MODE:-dashscope}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v4}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      RERANK_MODE: ${RERANK_MODE:-dashscope}
      RERANK_MODEL: ${RERANK_MODEL:-qwen3-rerank}
      RETRIEVAL_CANDIDATES: ${RETRIEVAL_CANDIDATES:-20}
      RERANK_TOP_N: ${RERANK_TOP_N:-6}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      CORS_ORIGINS: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/data/uploads

  web:
    build:
      context: frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
  qdrant_data:
  uploads_data:

